<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Informes AIEP - Dashboard Senior</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --verde-primario: #2e7d32;
            --verde-claro: #e8f5e9;
            --verde-acento: #4caf50;
            --texto: #2c3e50;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--verde-claro);
            color: var(--texto);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--blanco);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 3px solid var(--verde-primario);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        h1 { color: var(--verde-primario); margin: 0; }

        .upload-section {
            border: 2px dashed var(--verde-acento);
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .upload-section:hover {
            background-color: #f1f8e9;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
            display: none; /* Se activa al subir archivo */
        }

        .card {
            background: #f9f9f9;
            padding: 20px;
            border-left: 5px solid var(--verde-acento);
            border-radius: 5px;
        }

        .alert {
            color: #d32f2f;
            font-weight: bold;
            background: #ffebee;
            padding: 10px;
            border-radius: 5px;
            margin-top: 5px;
        }

        button {
            background-color: var(--verde-primario);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover { background-color: #1b5e20; }

        #text-preview {
            width: 100%;
            height: 200px;
            margin-top: 20px;
            border: 1px solid #ddd;
            padding: 10px;
            overflow-y: scroll;
            font-size: 0.9em;
            background: #fafafa;
        }

        canvas { max-width: 100%; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Analizador de Informes Académicos</h1>
        <p>Optimización de Estilo, Plagio y Naturalidad (AIEP)</p>
    </header>

    <div class="upload-section" id="drop-area">
        <p>Arrastra tu archivo <strong>.docx</strong> aquí o haz clic para seleccionar</p>
        <input type="file" id="file-input" accept=".docx" style="display: none;">
        <button onclick="document.getElementById('file-input').click()">Subir Informe</button>
    </div>

    <div id="loading" style="display:none;">Procesando algoritmos de análisis...</div>

    <div class="dashboard" id="dashboard">
        <div class="card">
            <h3>Índice de "Humanidad"</h3>
            <canvas id="chartHumanity"></canvas>
            <div id="humanity-feedback"></div>
        </div>

        <div class="card">
            <h3>Alertas de Estructura IA</h3>
            <div id="ai-alerts"></div>
        </div>

        <div class="card" style="grid-column: 1 / -1;">
            <h3>Vista Previa del Texto</h3>
            <div id="text-preview"></div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const dashboard = document.getElementById('dashboard');
    const aiAlerts = document.getElementById('ai-alerts');
    const textPreview = document.getElementById('text-preview');
    const humanityFeedback = document.getElementById('humanity-feedback');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('loading').style.display = 'block';
        
        const reader = new FileReader();
        reader.onload = function(event) {
            const arrayBuffer = event.target.result;
            mammoth.convertToPlain({arrayBuffer: arrayBuffer})
                .then(displayResult)
                .catch(handleError);
        };
        reader.readAsArrayBuffer(file);
    });

    function displayResult(result) {
        const text = result.value;
        document.getElementById('loading').style.display = 'none';
        dashboard.style.display = 'grid';
        
        analyzeText(text);
    }

    function analyzeText(text) {
        // 1. Análisis de Conectores (La IA usa siempre los mismos)
        const connectors = ['además', 'en conclusión', 'por otro lado', 'no obstante', 'asimismo'];
        let connectorCount = 0;
        connectors.forEach(c => {
            const regex = new RegExp('\\b' + c + '\\b', 'gi');
            const matches = text.match(regex);
            if(matches) connectorCount += matches.length;
        });

        // 2. Análisis de "Perplejidad" (Simulado: Variación de longitud de oraciones)
        const sentences = text.split(/[.!?]/).filter(s => s.trim().length > 0);
        const lengths = sentences.map(s => s.split(' ').length);
        const averageLength = lengths.reduce((a, b) => a + b, 0) / lengths.length;
        
        // Un texto humano tiene mucha varianza. La IA suele ser muy constante.
        const variance = lengths.reduce((a, b) => a + Math.pow(b - averageLength, 2), 0) / lengths.length;

        // 3. Generar Alertas
        aiAlerts.innerHTML = "";
        if (variance < 15) {
            aiAlerts.innerHTML += `<div class="alert">⚠️ Estructura Monótona: Las oraciones tienen longitudes muy similares. Esto es típico de IA generativa. Varía el ritmo.</div>`;
        }
        if (connectorCount > (sentences.length * 0.5)) {
            aiAlerts.innerHTML += `<div class="alert">⚠️ Exceso de conectores formales. Parece un texto generado mecánicamente.</div>`;
        }
        if (text.toLowerCase().includes("en resumen") || text.toLowerCase().includes("es importante destacar") || text.toLowerCase().includes("en conclusión")) {
            aiAlerts.innerHTML += `<div class="alert">🚩 Frases cliché detectadas: "En resumen", "En conclusión" o "Importante destacar" al final de párrafos son muletillas clásicas de IA.</div>`;
        }

        if(aiAlerts.innerHTML === "") aiAlerts.innerHTML = "✅ Estructura parece orgánica.";

        // 4. Renderizar Gráfico
        renderChart(variance);

        // 5. Preview con resaltado simple
        textPreview.innerText = text;
    }

    function renderChart(variance) {
        // Evitamos que el canvas duplique gráficos si se sube más de un archivo recargando el elemento
        const canvasContainer = document.getElementById('chartHumanity').parentElement;
        canvasContainer.innerHTML = '<h3>Índice de "Humanidad"</h3><canvas id="chartHumanity"></canvas><div id="humanity-feedback"></div>';
        
        const ctx = document.getElementById('chartHumanity').getContext('2d');
        const score = Math.min(100, variance * 2); // Algoritmo simple de senior para demo
        
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Naturalidad', 'Patrón IA'],
                datasets: [{
                    data: [score, 100 - score],
                    backgroundColor: ['#4caf50', '#ff5252']
                }]
            },
            options: { cutout: '70%' }
        });
        
        document.getElementById('humanity-feedback').innerHTML = `<p align="center">Puntaje de Variabilidad: <strong>${score.toFixed(1)}%</strong></p>`;
    }

    function handleError(err) {
        console.error(err);
        alert("Error al procesar el archivo. Asegúrate de que sea un .docx válido.");
    }
</script>

</body>
</html>
